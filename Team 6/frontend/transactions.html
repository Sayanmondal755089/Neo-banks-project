<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Bank - Transactions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">🏦 Neo<span>Bank</span></div>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="send_money.html">Send Money</a>
        <a href="transactions.html">Transactions</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<div class="container">

    <div class="page-title">📋 Transaction History</div>
    <div class="page-subtitle">View your recent UPI transactions</div>

    <!-- Filter Controls -->
    <div class="card" style="padding:22px 30px;">
        <div style="display:flex; gap:15px; align-items:flex-end; flex-wrap:wrap;">
            <div class="form-group" style="margin-bottom:0; flex:1; min-width:180px;">
                <label>UPI ID</label>
                <input type="text" id="searchUpi" placeholder="Enter UPI ID to search" />
            </div>
            <div class="form-group" style="margin-bottom:0; width:120px;">
                <label>Last N</label>
                <input type="number" id="nCount" value="10" min="1" max="50" />
            </div>
            <button class="btn btn-primary" onclick="loadTransactions()" style="width:auto; padding:12px 24px;">
                Search
            </button>
        </div>
    </div>

    
    <div class="card">
        <h2>Transactions <span id="txnCount" style="font-size:14px; color:#888; font-weight:400;"></span></h2>
        <div id="txnContainer">
            <p style="color:#aaa; font-size:14px;">Click Search to load transactions.</p>
        </div>
    </div>

    <div class="footer">Neo Bank UPI Simulator &nbsp;|&nbsp; Team 6 &nbsp;|&nbsp; Project 6</div>
</div>

<script>
    const BASE_URL = "http://127.0.0.1:5000";
    const user     = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location.href = "index.html";
    }

    
    document.getElementById("searchUpi").value = user.upi_id;

    function logout() {
        localStorage.removeItem("user");
        window.location.href = "index.html";
    }

    
    async function loadTransactions() {
        const upi_id = document.getElementById("searchUpi").value.trim();
        const n      = document.getElementById("nCount").value || 10;

        if (!upi_id) {
            document.getElementById("txnContainer").innerHTML =
                '<p style="color:#e74c3c; font-size:14px;">Please enter a UPI ID</p>';
            return;
        }

        document.getElementById("txnContainer").innerHTML =
            '<p style="color:#aaa; font-size:14px;">Loading...</p>';

        try {
            const response = await fetch(BASE_URL + "/transactions/" + upi_id + "?n=" + n);
            const data     = await response.json();

            if (!data.success) {
                document.getElementById("txnContainer").innerHTML =
                    '<p style="color:#e74c3c; font-size:14px;">' + data.message + '</p>';
                return;
            }

            const txns = data.transactions;
            document.getElementById("txnCount").textContent =
                "(" + txns.length + " records)";

            if (txns.length === 0) {
                document.getElementById("txnContainer").innerHTML =
                    '<p style="color:#aaa; font-size:14px;">No transactions found for this UPI ID.</p>';
                return;
            }

            
            let html = '<div style="overflow-x:auto;">';
            html += '<table class="txn-table"><thead><tr>';
            html += '<th>#</th><th>Txn ID</th><th>Sender</th><th>Receiver</th><th>Amount</th><th>Date & Time</th><th>Status</th>';
            html += '</tr></thead><tbody>';

            txns.forEach((txn, index) => {
                let isDebit  = txn.sender_upi === upi_id;
                let amtClass = isDebit ? "debit" : "credit";
                let amtSign  = isDebit ? "- Rs. " : "+ Rs. ";

                html += '<tr>';
                html += '<td style="color:#aaa;">' + (index + 1) + '</td>';
                html += '<td><strong>' + txn.txn_id + '</strong></td>';
                html += '<td>' + txn.sender_upi + '</td>';
                html += '<td>' + txn.receiver_upi + '</td>';
                html += '<td class="' + amtClass + '">' + amtSign + parseFloat(txn.amount).toFixed(2) + '</td>';
                html += '<td>' + txn.timestamp + '</td>';
                html += '<td><span class="badge-success">' + txn.status + '</span></td>';
                html += '</tr>';
            });

            html += '</tbody></table></div>';
            document.getElementById("txnContainer").innerHTML = html;

        } catch (err) {
            document.getElementById("txnContainer").innerHTML =
                '<p style="color:#e74c3c; font-size:14px;">Cannot connect to server. Make sure backend is running.</p>';
        }
    }

    
    loadTransactions();
</script>

</body>
</html>
