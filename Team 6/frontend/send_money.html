<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Bank - Send Money</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">🏦 Neo<span>Bank</span></div>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="send_money.html">Send Money</a>
        <a href="transactions.html">Transactions</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<div class="container">

    <div class="page-title">💸 Send Money</div>
    <div class="page-subtitle">Transfer money instantly using UPI ID</div>

    <div class="card">

       
        <div class="alert" id="sendAlert"></div>

        
        <div style="background:#f0f4ff; border-radius:8px; padding:14px 16px; margin-bottom:22px;">
            <span style="font-size:13px; color:#666;">Sending from : </span>
            <strong id="senderInfo" style="color:#1a1a7e; font-size:14px;"></strong>
            <span style="font-size:13px; color:#666; float:right;">Balance : </span>
            <strong id="senderBal" style="color:#1a1a7e; font-size:14px; float:right; margin-right:5px;"></strong>
        </div>

        <div class="form-group">
            <label>Receiver UPI ID</label>
            <input type="text" id="receiverUpi" placeholder="e.g.  team6@ybl" />
        </div>

        <div class="form-group">
            <label>Amount (Rs.)</label>
            <input type="number" id="amount" placeholder="Enter amount" min="1" />
        </div>

        <button class="btn btn-primary" onclick="sendMoney()" id="sendBtn">
            Send Money
        </button>

    </div>

    
    <div class="receipt-box" id="receiptBox">
        <div class="receipt-title">✅ Transaction Successful !</div>
        <div class="receipt-row">
            <span class="r-label">Transaction ID</span>
            <span class="r-value" id="rcptTxnId">--</span>
        </div>
        <div class="receipt-row">
            <span class="r-label">Sent To</span>
            <span class="r-value" id="rcptReceiver">--</span>
        </div>
        <div class="receipt-row">
            <span class="r-label">Amount</span>
            <span class="r-value" id="rcptAmount">--</span>
        </div>
        <div class="receipt-row">
            <span class="r-label">Remaining Balance</span>
            <span class="r-value" id="rcptBalance">--</span>
        </div>
        <div class="receipt-row">
            <span class="r-label">Date & Time</span>
            <span class="r-value" id="rcptTime">--</span>
        </div>
        <div style="margin-top:15px; text-align:center;">
            <a href="dashboard.html" class="btn btn-secondary" style="width:auto; padding:10px 25px;">
                Go to Dashboard
            </a>
        </div>
    </div>

    <div class="footer">Neo Bank UPI Simulator &nbsp;|&nbsp; Team 6 &nbsp;|&nbsp; Project 6</div>
</div>

<script>
    const BASE_URL = "http://127.0.0.1:5000";
    const user     = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location.href = "index.html";
    }

    // show sender info
    document.getElementById("senderInfo").textContent = user.upi_id;
    document.getElementById("senderBal").textContent  = "Rs. " + user.balance.toFixed(2);

    function logout() {
        localStorage.removeItem("user");
        window.location.href = "index.html";
    }

    function showAlert(message, type) {
        const el     = document.getElementById("sendAlert");
        el.className = "alert alert-" + type;
        el.textContent = message;
        el.style.display = "block";
    }

    async function sendMoney() {
        const receiver_upi = document.getElementById("receiverUpi").value.trim();
        const amount       = document.getElementById("amount").value;
        const btn          = document.getElementById("sendBtn");

        if (!receiver_upi || !amount) {
            showAlert("Please fill in all fields", "error");
            return;
        }

        
        btn.innerHTML = '<span class="loader"></span> Processing...';
        btn.disabled  = true;
        document.getElementById("receiptBox").style.display = "none";

        try {
            const response = await fetch(BASE_URL + "/send", {
                method  : "POST",
                headers : { "Content-Type": "application/json" },
                body    : JSON.stringify({
                    sender_upi   : user.upi_id,
                    receiver_upi : receiver_upi,
                    amount       : parseFloat(amount)
                })
            });

            const data = await response.json();

            if (data.success) {
                
                user.balance = data.new_balance;
                localStorage.setItem("user", JSON.stringify(user));

               
                document.getElementById("senderBal").textContent = "Rs. " + data.new_balance.toFixed(2);

                
                document.getElementById("rcptTxnId").textContent    = data.txn_id;
                document.getElementById("rcptReceiver").textContent  = data.receiver;
                document.getElementById("rcptAmount").textContent    = "Rs. " + data.amount.toFixed(2);
                document.getElementById("rcptBalance").textContent   = "Rs. " + data.new_balance.toFixed(2);
                document.getElementById("rcptTime").textContent      = data.timestamp;

                
                document.getElementById("receiptBox").style.display = "block";
                document.getElementById("sendAlert").style.display  = "none";

                
                document.getElementById("receiverUpi").value = "";
                document.getElementById("amount").value      = "";

            } else {
                showAlert(data.message, "error");
            }

        } catch (err) {
            showAlert("Cannot connect to server. Make sure backend is running.", "error");
        }

        btn.innerHTML = "Send Money";
        btn.disabled  = false;
    }
</script>

</body>
</html>
